name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  app:
    name: App móvil (Expo) — validar (no despliega)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Typecheck
        run: npm run typecheck
